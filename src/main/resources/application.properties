# Server port
server.port=8081

# Groq API Configuration
# IMPORTANT: Replace with your actual Groq API key from https://console.groq.com
groq.api.key=${GROQ_API_KEY}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.1-8b-instant

# Allow frontend (Vercel) to call this backend — update with your Vercel URL after deploy
cors.allowed.origins=http://localhost:5500,http://127.0.0.1:5500,https://caption-generator-frontend-eosin.vercel.app